<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>あなたの総合鑑定書 — STELLARIUM</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060410;--surf:#0e0726dd;
  --bdr:#965aff28;--bdr2:#aa78ff55;
  --purple:#9b72cf;--purple2:#c4a0ff;
  --gold:#d4af6e;--gold2:#f0c87a;
  --text:#e8e0f0;--textd:#b89ed080;--textb:#f5eeff;
}
html,body{background:var(--bg);color:var(--text);font-family:'EB Garamond',serif;min-height:100%}
body{overflow-x:hidden}
.stars{pointer-events:none;position:fixed;inset:0;z-index:0}
.star{background:#fff;border-radius:50%;position:absolute;animation:tw 3s ease-in-out infinite alternate}
@keyframes tw{from{opacity:.1;transform:scale(.8)}to{opacity:.7;transform:scale(1.2)}}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 20px 80px}
header{text-align:center;padding:48px 20px 36px;border-bottom:1px solid var(--bdr);margin-bottom:40px}
.hdr-orn{font-size:.65rem;letter-spacing:.4em;color:var(--gold);opacity:.7;margin-bottom:10px}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,3.5vw,2.2rem);font-weight:700;
   letter-spacing:.15em;background:linear-gradient(135deg,#c4a0ff,#f0c87a,#c4a0ff);
   -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.sub-ttl{font-family:'Cinzel',serif;color:var(--purple2);letter-spacing:.2em;font-size:.82rem}
.loading{text-align:center;padding:80px 20px}
.loading-orb{width:60px;height:60px;border-radius:50%;border:2px solid var(--purple2);
  border-top-color:transparent;animation:spin 1.2s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--purple2);font-size:1.05rem;letter-spacing:.1em}
.error-box{background:var(--surf);border:1px solid #ff6b6b44;border-radius:12px;
  padding:32px;text-align:center;margin:40px 0;display:none}
.error-box p{color:#ff9999;margin-bottom:16px}
.retry-btn{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.1em;background:transparent;
  border:1px solid var(--purple2);color:var(--purple2);padding:10px 24px;border-radius:6px;
  cursor:pointer;transition:all .2s}
.retry-btn:hover{background:var(--purple2);color:#060410}
#reading-content{display:none}
.actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:36px}
.btn{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.12em;padding:14px 32px;
  border-radius:8px;cursor:pointer;border:none;transition:all .25s;text-decoration:none;display:inline-block}
.btn-primary{background:linear-gradient(135deg,#7c4dff,#c4a0ff);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px #9b72cf44}
.btn-outline{background:transparent;border:1px solid var(--purple2);color:var(--purple2)}
.btn-outline:hover{background:var(--purple2);color:#060410}
.reading-card{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;
  padding:40px 48px;margin-bottom:32px;backdrop-filter:blur(10px);line-height:1.95}
.reading-text{font-size:1.08rem;color:var(--textb);white-space:pre-wrap;word-break:break-word}
.divider{text-align:center;color:var(--gold);opacity:.5;font-size:1.4rem;letter-spacing:.5em;margin:16px 0 40px}
.sub-section{background:linear-gradient(135deg,#0e0726,#130a2f);border:1px solid var(--bdr2);
  border-radius:16px;padding:40px;text-align:center}
.sub-section h3{font-family:'Cinzel Decorative',serif;font-size:1.25rem;letter-spacing:.12em;
  color:var(--gold2);margin-bottom:14px}
.sub-section p{color:var(--purple2);font-size:.95rem;line-height:1.85;margin-bottom:20px}
.sub-price{font-family:'JetBrains Mono',monospace;font-size:2rem;color:var(--textb);margin-bottom:4px}
.sub-price span{font-size:1rem;color:var(--textd)}
.sub-note{font-size:.75rem;color:var(--textd);margin-bottom:28px;letter-spacing:.05em}
.sub-badge{display:inline-block;background:#9b72cf22;border:1px solid var(--purple);
  border-radius:4px;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;
  color:var(--purple2);padding:4px 12px;margin-bottom:18px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">
  <header>
    <div class="hdr-orn">&#10022; &#10022; &#10022;</div>
    <h1>あなたの総合鑑定書</h1>
    <div class="sub-ttl">STELLARIUM &mdash; Personal Reading by Stella</div>
  </header>
  <div class="loading" id="loading">
    <div class="loading-orb"></div>
    <p id="loading-msg">星々の声を束ねています…</p>
  </div>
  <div class="error-box" id="error-box">
    <p id="error-msg">鑑定書の取得中にエラーが発生しました。</p>
    <button class="retry-btn" onclick="startFetch()">もう一度試す</button>
  </div>
  <div id="reading-content">
    <div class="actions">
      <button class="btn btn-primary" onclick="downloadPDF()">PDF でダウンロード</button>
      <a class="btn btn-outline" href="/stellarium-v4_1.html">ホームへ戻る</a>
    </div>
    <div class="reading-card" id="reading-card">
      <div class="reading-text" id="reading-text"></div>
    </div>
    <div class="divider">&#10022; &nbsp; &#10022; &nbsp; &#10022;</div>
    <div class="sub-section">
      <div class="sub-badge">MONTHLY PLAN</div>
      <h3>毎月のパーソナルレポートを<br>受け取りませんか？</h3>
      <p>毎月、あなたの星の動きをステラが読み解きます。<br>
      今月のテーマ・注意すべき日・流れに乗るための行動指針を<br>
      美しいレポートとしてお届けします。</p>
      <div class="sub-price">&yen;1,980 <span>/ 月</span></div>
      <div class="sub-note">いつでもキャンセル可能 &middot; 初月無料</div>
      <button class="btn btn-primary" onclick="alert('月額プランは準備中です。もうしばらくお待ちください。')">
        月額プランを始める
      </button>
    </div>
  </div>
</div>
<script>
(function(){
  var c=document.getElementById('stars');
  for(var i=0;i<120;i++){
    var s=document.createElement('div'); s.className='star';
    var sz=Math.random()*2.4+0.6;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-delay:'+Math.random()*4+'s;animation-duration:'+(2+Math.random()*3)+'s';
    c.appendChild(s);
  }
})();
var sessionId=new URLSearchParams(location.search).get('session_id');
var attempt=0,MAX=10;
function startFetch(){
  attempt=0;
  document.getElementById('loading').style.display='block';
  document.getElementById('error-box').style.display='none';
  document.getElementById('reading-content').style.display='none';
  poll();
}
function poll(){
  if(!sessionId){showError('セッションIDが見つかりません。');return;}
  fetch('/api/get-reading?session_id='+encodeURIComponent(sessionId))
    .then(function(res){
      if(res.status===404&&attempt<MAX){
        attempt++;
        document.getElementById('loading-msg').textContent='星々の声を束ねています… ('+attempt+'/'+MAX+')';
        setTimeout(poll,4000);return;
      }
      if(!res.ok){res.json().catch(function(){return{};}).then(function(d){showError(d.error||'鑑定書の取得に失敗しました。');});return;}
      res.json().then(function(d){
        document.getElementById('reading-text').textContent=d.reading;
        document.getElementById('loading').style.display='none';
        document.getElementById('reading-content').style.display='block';
      });
    })
    .catch(function(){showError('通信エラーが発生しました。しばらくしてから再度お試しください。');});
}
function showError(msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('error-msg').textContent=msg;
  document.getElementById('error-box').style.display='block';
}
function downloadPDF(){
  html2pdf().set({margin:[15,15,15,15],filename:'STELLARIUM_鑑定書.pdf',
    image:{type:'jpeg',quality:0.95},
    html2canvas:{scale:2,backgroundColor:'#060410'},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(document.getElementById('reading-card')).save();
}
startFetch();
</script>
</body>
</html>
