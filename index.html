<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STELLARIUM - 精密ホロスコープ</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060410;--surf:#0e0726dd;--surf2:#130a2fbb;
  --bdr:#965aff28;--bdr2:#aa78ff55;
  --purple:#9b72cf;--purple2:#c4a0ff;
  --gold:#d4af6e;--gold2:#f0c87a;
  --text:#e8e0f0;--textd:#b89ed080;--textb:#f5eeff;
  --glow:#965aff18;
  --fire:#FF7A5A;--earth:#B8A07A;--air:#88CCE8;--water:#7898D8;
}
html,body{background:var(--bg);color:var(--text);font-family:'EB Garamond',serif;min-height:100%}
body{overflow-x:hidden}

/* Stars */
.stars{pointer-events:none;position:fixed;inset:0;z-index:0}
.star{background:#fff;border-radius:50%;position:absolute;animation:tw 3s ease-in-out infinite alternate}
@keyframes tw{from{opacity:.1;transform:scale(.8)}to{opacity:.7;transform:scale(1.2)}}

.wrap{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 16px 80px}

/* Header */
header{text-align:center;padding:40px 20px 28px;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.hdr-orn{font-size:.65rem;letter-spacing:.4em;color:var(--gold);opacity:.7;margin-bottom:10px}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.5rem,4vw,2.8rem);font-weight:700;
   letter-spacing:.18em;background:linear-gradient(135deg,#c4a0ff,#f0c87a,#c4a0ff);
   -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
h1 em{-webkit-text-fill-color:var(--gold);font-style:normal;margin:0 12px;font-size:.75em}
.sub{font-family:'Cinzel',serif;color:var(--purple2);letter-spacing:.25em;font-size:.85rem}

/* Input */
.icard{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:18px 22px;margin-bottom:18px;backdrop-filter:blur(10px)}
.igrid{display:flex;flex-direction:column;gap:14px}
.ib{display:flex;flex-direction:column;gap:6px}
.ib label{font-family:'Cinzel',serif;font-size:.63rem;letter-spacing:.14em;color:var(--textd)}
.fr{display:flex;align-items:center;gap:4px}
.sep{color:var(--textd);font-size:.8rem}
input[type=number]{background:#ffffff09;border:1px solid var(--bdr);border-radius:6px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:.82rem;padding:6px 8px;width:64px;
  -moz-appearance:textfield;transition:border-color .2s}
select{background:#ffffff09;border:1px solid var(--bdr);border-radius:6px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:.82rem;padding:6px 4px;width:82px;transition:border-color .2s}
select.sm{width:60px}
select option{background-color:#1a1a2e;color:#ffffff}
select:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 2px #9b72cf28}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 2px #9b72cf28}
input[type=number].sm{width:48px}
input[type=number].coord{width:88px}
input[type=text]{background:#ffffff09;border:1px solid var(--bdr);border-radius:6px;color:var(--text);
  font-family:'EB Garamond',serif;font-size:.88rem;padding:6px 10px;width:100%;transition:border-color .2s}
input[type=text]:focus{outline:none;border-color:var(--purple)}
.city-wrap{position:relative;flex:1;min-width:140px}
.city-dd{position:absolute;top:calc(100%+2px);left:0;right:0;z-index:200;
  background:#0b0420f8;border:1px solid var(--bdr2);border-radius:8px;overflow:hidden;
  backdrop-filter:blur(16px);box-shadow:0 8px 32px #000c}
.city-dd button{display:flex;justify-content:space-between;align-items:center;width:100%;
  border:none;border-bottom:1px solid var(--bdr);background:0;color:var(--text);cursor:pointer;
  padding:8px 12px;font-family:'EB Garamond',serif;font-size:.84rem;transition:background .15s}
.city-dd button:last-child{border-bottom:none}
.city-dd button:hover{background:#9b72cf22}
.city-meta{font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--textd)}
.calc-wrap{margin-left:auto}
.calc-btn{background:linear-gradient(135deg,#6e32be50,#46198c66);border:1px solid var(--purple);
  border-radius:8px;color:var(--purple2);cursor:pointer;font-family:'Cinzel',serif;
  font-size:.75rem;letter-spacing:.1em;padding:10px 26px;transition:all .25s;white-space:nowrap}
.calc-btn:hover:not(:disabled){border-color:var(--purple2);color:var(--textb);box-shadow:0 0 18px #9b72cf40}
.calc-btn:disabled{opacity:.55;cursor:not-allowed}
.jd{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--textd);margin-top:6px}

/* Result layout */
.result{display:flex;flex-direction:column;gap:20px}

/* Section card */
.scard{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:20px 22px;backdrop-filter:blur(10px)}
.shdr{font-family:'Cinzel',serif;font-size:.74rem;letter-spacing:.2em;color:var(--gold);
  border-bottom:1px solid var(--bdr);padding-bottom:8px;margin-bottom:14px}

/* Summary */
.summary{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.pill{display:flex;align-items:center;gap:7px;background:var(--surf2);border:1px solid var(--bdr);
  border-radius:18px;padding:5px 13px}
.pill-lbl{font-family:'Cinzel',serif;font-size:.62rem;color:var(--textd);letter-spacing:.1em}
.pill-val{font-size:.86rem}

/* Wheel center */
.wheel-wrap{display:flex;justify-content:center;margin-bottom:22px}
.wheel-wrap canvas{width:min(90vw,700px);height:min(90vw,700px)}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.tbl th{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;color:var(--gold);
  text-align:left;padding:3px 8px;border-bottom:1px solid var(--bdr);background:#0000002a;white-space:nowrap}
.tbl td{padding:2px 8px;border-bottom:1px solid #965aff10;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--glow)}
.tbl tr.ang td{background:#d4af6e09}
.psym{font-size:.9rem;margin-right:4px}
.pname{font-size:.78rem}
.ssym{font-size:.8rem;margin-right:3px}
.deg{font-family:'JetBrains Mono',monospace;font-size:.79rem}
.min{font-family:'JetBrains Mono',monospace;font-size:.73rem;color:var(--textd)}
.hcell{font-family:'JetBrains Mono',monospace;font-size:.75rem;text-align:center}
.badge{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.04em;border:1px solid;border-radius:3px;padding:1px 6px;white-space:nowrap}
.retro{color:#ff9090;background:#ff646420;border:1px solid #ff64644a;border-radius:3px;padding:1px 6px;font-size:.68rem}
.hnum{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;
  background:#9b72cf2a;border-radius:50%;margin-right:6px;font-size:.7rem}
.atag{color:var(--gold);border:1px solid #d4af6e50;border-radius:3px;padding:1px 4px;font-size:.56rem;margin-left:4px}
.hmean{font-size:.7rem;color:var(--textd)}


/* Tables vertical stack */
.tables-stack{display:flex;flex-direction:column;gap:22px}

/* Aspects */
.asp-matrix{overflow-x:auto;margin-bottom:12px}
.asp-matrix table{border-collapse:collapse;font-size:.88rem}
.asp-matrix th{text-align:center;padding:5px 8px;font-size:1rem;border-bottom:2px solid var(--bdr2);border-right:1px solid var(--bdr2)}
.asp-matrix td.rh{text-align:center;padding:5px 8px;font-size:1rem;border-right:2px solid var(--bdr2);border-bottom:1px solid #965aff40}
.asp-matrix td{text-align:center;padding:3px 6px;border-bottom:1px solid #965aff40;border-right:1px solid #965aff28;font-size:1.1rem;cursor:default}
.asp-list{display:flex;flex-direction:column;gap:4px}
.asp-row{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #965aff0c;font-size:.78rem}
.asp-row:last-child{border-bottom:none}
.asp-orb{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--textd)}
.asp-exact{color:gold;font-size:.72rem}

/* Classifications */
.cls-section{margin-bottom:16px}
.cls-title{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.16em;color:var(--gold);
  border-bottom:1px solid var(--bdr);padding-bottom:7px;margin-bottom:10px}
.cls-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cls-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cls-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(max-width:700px){.cls-grid-4{grid-template-columns:repeat(2,1fr)}}
.cls-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:10px}
.cls-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.cls-badge{font-family:'Cinzel',serif;font-size:.88rem;font-weight:700}
.cls-cnt{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:700;opacity:.9}
.cls-body{font-size:.75rem;color:var(--text);line-height:1.6}
.cls-none{font-size:.7rem;color:var(--textd)}

canvas{display:block}

/* Aspect groups */
.asp-groups{display:flex;flex-direction:column;gap:10px;margin-top:2px}
.asp-group{background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.asp-group-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid;background:#ffffff04}
.asp-gsym{font-size:1.15rem;line-height:1;flex-shrink:0}
.asp-gja{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.08em;font-weight:600}
.asp-gsub{font-size:.64rem;color:var(--textd);font-family:'JetBrains Mono',monospace;margin-left:2px}
.asp-gcnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--textd);
  background:#ffffff0a;border-radius:10px;padding:1px 7px}
.asp-items{padding:6px 10px;display:flex;flex-direction:column;gap:2px}
.asp-item{display:flex;align-items:center;gap:6px;padding:4px 2px;
  border-bottom:1px solid #965aff0a;font-size:.8rem}
.asp-item:last-child{border-bottom:none}
.asp-p1,.asp-p2{white-space:nowrap}
.asp-sym{font-size:1rem;flex-shrink:0}
.asp-orb{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--textd)}

/* Responsive */
@media(max-width:600px){
  .igrid{gap:10px 14px}
  .scard{padding:14px 14px}
}

/* 2画面 */
.input-wrap{max-width:680px;margin:0 auto;padding:30px 16px 80px}
.result-header{display:flex;align-items:center;gap:16px;padding:14px 20px 14px;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.back-btn{background:var(--surf2);border:1px solid var(--bdr2);border-radius:6px;color:var(--purple2);cursor:pointer;font-family:'Cinzel',serif;font-size:.72rem;padding:7px 16px;letter-spacing:.08em;transition:all .2s;white-space:nowrap}
.back-btn:hover{border-color:var(--purple2);color:var(--textb)}
.result-title{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);letter-spacing:.15em}
.copy-wrap{text-align:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--bdr)}
.copy-btn{background:linear-gradient(135deg,#3a280088,#5a3d0066);border:1px solid var(--gold);border-radius:8px;color:var(--gold2);cursor:pointer;font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.15em;padding:11px 32px;transition:all .25s;white-space:nowrap}
.copy-btn:hover{border-color:var(--gold2);color:var(--textb);box-shadow:0 0 22px #d4af6e30}
.copy-note{font-size:.72rem;color:var(--textd);margin-top:10px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- 画面1: 入力 -->
<div id="screen-input">
  <div class="input-wrap">
    <header>
      <div class="hdr-orn">✦ NATAL CHART ✦</div>
      <h1>STELL<em>✦</em>RIUM</h1>
      <div class="sub">精密ホロスコープ　Produced by 高瀬リンネ</div>
    </header>
    <div class="icard">
      <div class="igrid">
        <div class="ib">
          <label>生年月日</label>
          <div class="fr">
            <select id="year"></select>
            <span class="sep">/</span>
            <select id="month" class="sm"></select>
            <span class="sep">/</span>
            <select id="day" class="sm"></select>
          </div>
        </div>
        <div class="ib">
          <label>出生時刻</label>
          <div class="fr">
            <select id="hour" class="sm"></select>
            <span class="sep">:</span>
            <select id="minute" class="sm"></select>
          </div>
          <small style="color:#888;font-size:0.7rem">時刻不明の場合は 12:00 を選択してください</small>
        </div>
        <div class="ib city-wrap">
          <label>出生地</label>
          <input type="text" id="city" placeholder="都市名・都道府県" autocomplete="off">
          <div class="city-dd" id="cityDD" style="display:none"></div>
          <small style="color:#888;font-size:0.7rem">最寄りの主要都市名を入力（例：Tokyo, Osaka, Sapporo）</small>
        </div>
        <div class="ib">
          <label>UTC+</label>
          <input type="number" id="tz" value="9" min="-12" max="14" step="0.5" class="sm">
          <small style="color:#888;font-size:0.7rem">※ UTCは変更しないでください</small>
        </div>
        <div class="ib">
          <label>緯度 / 経度</label>
          <div class="fr">
            <input type="number" id="lat" value="35.6762" step=".0001" class="coord">
            <span class="sep">/</span>
            <input type="number" id="lon" value="139.6503" step=".0001" class="coord">
          </div>
        </div>
      </div>
      <div style="margin-top:22px;text-align:center">
        <button class="calc-btn" id="calcBtn" onclick="calc()">✦ ホロスコープを作成</button>
      </div>
    </div>
  </div>
</div>

<!-- 画面2: 結果 -->
<div id="screen-result" style="display:none">
  <div class="wrap">
    <div class="result-header">
      <button class="back-btn" onclick="goBack()">← 戻る</button>
      <div class="result-title" id="resultTitle"></div>
    </div>
    <div id="out"></div>
  </div>
</div>

<script>
// Stars
(()=>{const c=document.getElementById('stars');for(let i=0;i<65;i++){const s=document.createElement('div');s.className='star';const z=(Math.random()*2+1)+'px';s.style.cssText=`width:${z};height:${z};top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;c.appendChild(s)}})()

// Populate date/time selects
;(()=>{
  function opts(el,from,to,pad,selected,step=1){
    for(let v=from;v<=to;v+=step){
      const o=document.createElement('option')
      o.value=v; o.textContent=pad?String(v).padStart(2,'0'):v
      if(v===selected) o.selected=true
      el.appendChild(o)
    }
  }
  opts(document.getElementById('year'),1900,2050,false,1990)
  opts(document.getElementById('month'),1,12,true,1)
  opts(document.getElementById('day'),1,31,true,1)
  opts(document.getElementById('hour'),0,23,true,12)
  opts(document.getElementById('minute'),0,59,true,0,1)
})()

const PCOL={男性:'#FFD080',女性:'#88AADD'}

const PLCOL={Sun:'#FFD700',Moon:'#C0C8D0',Mercury:'#A8C8E8',Venus:'#FFB6C1',Mars:'#FF6B6B',Jupiter:'#FF8C00',Saturn:'#8B7355',Uranus:'#7FDBFF',Neptune:'#4169E1',Pluto:'#9B59B6'}

const QUAL={牡羊座:'活動',蟹座:'活動',天秤座:'活動',山羊座:'活動',牡牛座:'不動',獅子座:'不動',蠍座:'不動',水瓶座:'不動',双子座:'柔軟',乙女座:'柔軟',射手座:'柔軟',魚座:'柔軟'}
const POL={牡羊座:'男性',双子座:'男性',獅子座:'男性',天秤座:'男性',射手座:'男性',水瓶座:'男性',牡牛座:'女性',蟹座:'女性',乙女座:'女性',蠍座:'女性',山羊座:'女性',魚座:'女性'}
const HMEAN=['自己・外見','財産・価値観','兄弟・交流','家庭・基盤','恋愛・創造','健康・労働','パートナー','死・変容','哲学・旅行','社会・地位','友人・理想','秘密・潜在']

function calc(){
  if(!window.AstroEngine){alert('エンジン読み込み中です');return}
  const btn=document.getElementById('calcBtn')
  btn.disabled=true;btn.textContent='計算中...'
  setTimeout(()=>{
    try{
      const y=+document.getElementById('year').value
      const mo=+document.getElementById('month').value
      const d=+document.getElementById('day').value
      const hh=+document.getElementById('hour').value
      const mi=+document.getElementById('minute').value
      const tz=+document.getElementById('tz').value
      const h=window.AstroEngine.calcHoroscope({
        year:y,month:mo,day:d,hour:hh,minute:mi,timezone:tz,
        latitude:+document.getElementById('lat').value,
        longitude:+document.getElementById('lon').value,
      })
      // 画面2へ遷移
      document.getElementById('screen-input').style.display='none'
      document.getElementById('screen-result').style.display='block'
      window.scrollTo({top:0,behavior:'smooth'})
      const pad=n=>String(n).padStart(2,'0')
      document.getElementById('resultTitle').textContent=
        y+'/'+pad(mo)+'/'+pad(d)+' '+pad(hh)+':'+pad(mi)+' UTC+'+ tz
      render(h)
    }catch(e){console.error(e);alert('計算エラー: '+e.message)}
    btn.disabled=false;btn.textContent='✦ ホロスコープを作成'
  },30)
}
function goBack(){
  document.getElementById('screen-result').style.display='none'
  document.getElementById('screen-input').style.display='block'
}

function buildChartText(){
  const h=_lastH; if(!h) return ''
  const S=h.signs
  const pad2=n=>String(n).padStart(2,'0')
  const fmtDeg=(lon)=>{const d=Math.floor(lon%30),m=Math.floor((lon%30-d)*60);return `${d}°${pad2(m)}'`}
  const lines=[]

  lines.push('── 天体配置 ─────────────────────')
  h.planets.forEach(p=>{
    const s=S[Math.floor(p.longitude/30)]
    lines.push(`${p.symbol} ${p.nameJa.padEnd(4,'　')} ${s.nameJa} ${fmtDeg(p.longitude)}  ${p.house}室${p.retrograde?' ℞':''}`)
  })
  const a=h.houses.ascendant,mc=h.houses.midheaven
  lines.push('  ASC  '+S[Math.floor(a/30)].nameJa+' '+fmtDeg(a))
  lines.push('  MC   '+S[Math.floor(mc/30)].nameJa+' '+fmtDeg(mc))
  lines.push('  DSC  '+S[Math.floor((a+180)%360/30)].nameJa+' '+fmtDeg((a+180)%360))
  lines.push('  IC   '+S[Math.floor((mc+180)%360/30)].nameJa+' '+fmtDeg((mc+180)%360))

  lines.push('')
  lines.push('── ハウス・カスプ (Placidus) ─────────')
  for(let n=1;n<=12;n++){
    const lon=h.houses.cusps[n],s=S[Math.floor(lon/30)]
    lines.push(` ${String(n).padStart(2)}室  ${s.nameJa} ${fmtDeg(lon)}`)
  }

  lines.push('')
  lines.push(`── アスペクト (${h.aspects.length}件) ──────────────`)
  h.aspects.forEach(asp=>{
    const p1=h.planets.find(p=>p.name===asp.planet1),p2=h.planets.find(p=>p.name===asp.planet2)
    if(p1&&p2) lines.push(`${p1.symbol}${p1.nameJa} ${asp.symbol} ${p2.symbol}${p2.nameJa}  ${asp.typeJa}  ${asp.orb.toFixed(1)}°`)
  })

  lines.push('')
  lines.push('── 元素・区分 ───────────────────')
  const cnt=(map,keys)=>keys.map(k=>{const n=h.planets.filter(p=>map[p.signJa]===k).length;return `${k}${n}個`}).join(' / ')
  lines.push('四元素：'+cnt(ELEM,['火','地','風','水']))
  lines.push('三区分：'+cnt(QUAL,['活動','不動','柔軟']))
  lines.push('二区分：'+cnt(POL,['男性','女性']))
  lines.push('')
  ;['火','地','風','水'].forEach(el=>{
    const ps=h.planets.filter(p=>ELEM[p.signJa]===el)
    lines.push(`  ${el}：${ps.length?ps.map(p=>p.symbol+p.nameJa).join(' · '):'なし'}`)
  })
  ;['活動','不動','柔軟'].forEach(ql=>{
    const ps=h.planets.filter(p=>QUAL[p.signJa]===ql)
    lines.push(`  ${ql}：${ps.length?ps.map(p=>p.symbol+p.nameJa).join(' · '):'なし'}`)
  })
  ;['男性','女性'].forEach(pl=>{
    const ps=h.planets.filter(p=>POL[p.signJa]===pl)
    lines.push(`  ${pl}：${ps.length?ps.map(p=>p.symbol+p.nameJa).join(' · '):'なし'}`)
  })

  return lines.join('\n')
}

function copyChart(){
  const btn=document.getElementById('copyBtn')
  const text=buildChartText()
  if(!text) return
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✦ Copied'
    setTimeout(()=>{btn.textContent='✦ Copy Chart Data'},2000)
  })
}

function renderPlanets(h){
  const S=h.signs
  const fmtLon=lon=>{
    const s=S[Math.floor(lon/30)],d=Math.floor(lon%30),m=Math.floor((lon%30-d)*60)
    const ec=ECOL[ELEM[s.nameJa]]||'#888'
    return {s,d,m,ec}
  }
  const rows=h.planets.map(p=>{
    const el=ELEM[p.signJa]||''
    const ec=ECOL[el]||'#888'
    const signObj=S[Math.floor(p.longitude/30)]
    return `<tr>
      <td><span class="psym">${p.symbol}</span><span class="pname">${p.nameJa}</span></td>
      <td><span class="ssym">${signObj.symbol}</span><span style="color:${ec}">${p.signJa}</span></td>
      <td><span class="deg">${p.degree}°</span><span class="min">${String(p.minute).padStart(2,'0')}'</span></td>
      <td class="hcell">${p.house}室</td>
      <td>${p.retrograde?'<span class="retro">℞</span>':''}</td>
    </tr>`
  }).join('')

  // アングル行
  const a=h.houses.ascendant, mc=h.houses.midheaven
  const angles=[
    {lbl:'ASC',sym:'↑',lon:a},
    {lbl:'MC', sym:'⊙',lon:mc},
    {lbl:'DES',sym:'↓',lon:(a+180)%360},
    {lbl:'IC', sym:'⊙',lon:(mc+180)%360},
  ]
  const angRows=angles.map(({lbl,sym,lon})=>{
    const {s,d,m,ec}=fmtLon(lon)
    return `<tr style="opacity:.85">
      <td colspan="2"><span style="font-family:'Cinzel',serif;font-size:.7rem;color:var(--gold);letter-spacing:.1em">${lbl}</span>
        <span class="ssym" style="margin-left:6px">${s.symbol}</span><span style="color:${ec}">${s.nameJa}</span></td>
      <td><span class="deg">${d}°</span><span class="min">${String(m).padStart(2,'0')}'</span></td>
      <td class="hcell" colspan="2"><span style="color:var(--textd);font-size:.7rem">${lbl==='ASC'?'上昇点':lbl==='MC'?'中天':lbl==='DES'?'下降点':'天底'}</span></td>
    </tr>`
  }).join('')

  return `<div class="shdr">天体</div>
  <table class="tbl"><thead><tr><th>天体</th><th>サイン</th><th>度数</th><th>H</th><th>逆行</th></tr></thead>
  <tbody>${rows}
  <tr><td colspan="5" style="padding:3px 0;border-bottom:1px solid var(--bdr)"></td></tr>
  ${angRows}
  </tbody></table>`
}

function renderHouses(h){
  const S=h.signs
  const rows=Array.from({length:12},(_,i)=>i+1).map(n=>{
    const lon=h.houses.cusps[n],s=S[Math.floor(lon/30)]
    const d=Math.floor(lon%30),m=Math.floor((lon%30-d)*60)
    const ec=ECOL[ELEM[s.nameJa]]||'#888'
    const isAng=[1,4,7,10].includes(n)
    const angLabels={1:'ASC',4:'IC',7:'DES',10:'MC'}
    return `<tr class="${isAng?'ang':''}">
      <td><span class="hnum">${n}</span>${isAng?`<span class="atag">${angLabels[n]}</span>`:''}</td>
      <td><span class="ssym">${s.symbol}</span><span style="color:${ec}">${s.nameJa}</span></td>
      <td><span class="deg">${d}°</span><span class="min">${String(m).padStart(2,'0')}'</span></td>
      <td class="hmean">${HMEAN[n-1]}</td>
    </tr>`
  }).join('')
  return `<div class="shdr">ハウス・カスプ <span style="font-size:.6rem;color:var(--textd);font-family:'JetBrains Mono',monospace">Placidus</span></div>
  <table class="tbl"><thead><tr><th>ハウス</th><th>サイン</th><th>カスプ</th><th>意味</th></tr></thead>
  <tbody>${rows}</tbody></table>`
}

function renderAspects(h){
  const pn=name=>{const p=h.planets.find(x=>x.name===name);return p?`${p.symbol}${p.nameJa}`:name}

  const ASP_ORDER=[
    {type:'Conjunction',   ja:'コンジャンクション', sub:'合 0°',     col:'#FFD700'},
    {type:'Opposition',    ja:'オポジション',       sub:'衝 180°',   col:'#FF8C00'},
    {type:'Trine',         ja:'トライン',           sub:'三角 120°', col:'#44BB44'},
    {type:'Square',        ja:'スクエア',           sub:'矩 90°',    col:'#FF4444'},
    {type:'Sextile',       ja:'セクスタイル',       sub:'六角 60°',  col:'#00CED1'},
    {type:'Quincunx',      ja:'クインカンクス',     sub:'補 150°',   col:'#9370DB'},
    {type:'Semisquare',    ja:'セミスクエア',       sub:'45°',       col:'#FFA07A'},
    {type:'Sesquiquadrate',ja:'セスキクォドレート', sub:'135°',      col:'#DDA0DD'},
  ]

  const matRows=h.planets.map((p1,i)=>`<tr>
    <td class="rh" style="color:${PLCOL[p1.name]||'#ccc'}">${p1.symbol}</td>
    ${h.planets.map((p2,j)=>{
      if(i===j) return `<td style="background:#9b72cf0a"></td>`
      if(i>j){
        const a=h.aspects.find(a=>(a.planet1===p1.name&&a.planet2===p2.name)||(a.planet1===p2.name&&a.planet2===p1.name))
        const col=a?ACOL[a.type]||'#888':null
        return `<td title="${a?a.typeJa+' '+a.orb.toFixed(1)+'°':'アスペクトなし'}">${a?`<span style="color:${col};font-size:1.05rem;filter:drop-shadow(0 0 3px ${col}66)">${a.symbol}</span>`:'<span style="color:#965aff18;font-size:.7rem">·</span>'}</td>`
      }
      return '<td></td>'
    }).join('')}
  </tr>`).join('')

  const groups=ASP_ORDER.map(def=>{
    const list=h.aspects.filter(a=>a.type===def.type)
    if(!list.length) return ''
    const rows=list.map(a=>`
      <div class="asp-item">
        <span class="asp-p1">${pn(a.planet1)}</span>
        <span class="asp-sym" style="color:${def.col};filter:drop-shadow(0 0 4px ${def.col}55)">${a.symbol}</span>
        <span class="asp-p2">${pn(a.planet2)}</span>
        ${a.exact?'<span class="asp-exact" title="完全合">★</span>':''}
        <span class="asp-orb">${a.orb.toFixed(1)}°</span>
      </div>`).join('')
    return `<div class="asp-group">
      <div class="asp-group-hdr" style="border-color:${def.col}44">
        <span class="asp-gsym" style="color:${def.col};filter:drop-shadow(0 0 5px ${def.col}88)">${list[0].symbol}</span>
        <span class="asp-gja" style="color:${def.col}">${def.ja}</span>
        <span class="asp-gsub">${def.sub}</span>
        <span class="asp-gcnt">${list.length}件</span>
      </div>
      <div class="asp-items">${rows}</div>
    </div>`
  }).filter(Boolean).join('')

  return `<div class="shdr">アスペクト (${h.aspects.length}件)</div>
  <div class="asp-matrix">
    <table>
      <thead><tr>
        <td style="width:28px"></td>
        ${h.planets.map(p=>`<th title="${p.nameJa}" style="color:${PLCOL[p.name]||'#ccc'}">${p.symbol}</th>`).join('')}
      </tr></thead>
      <tbody>${matRows}</tbody>
    </table>
  </div>
  <div class="asp-groups">${groups||'<div style="color:var(--textd);font-size:.8rem">アスペクトなし</div>'}</div>`
}

function renderCls(h){
  function group(map,col){
    const cats=[...new Set(Object.values(map))]
    return cats.map(cat=>{
      const bodies=h.planets.filter(p=>map[p.signJa]===cat)
      const c=col[cat]||'#888'
      return `<div class="cls-card">
        <div class="cls-hdr"><span class="cls-badge" style="color:${c}">${cat}</span><span class="cls-cnt" style="color:${c}">${bodies.length}</span></div>
        ${bodies.length?`<div class="cls-body">${bodies.map(p=>`${p.symbol}${p.nameJa}`).join(' · ')}</div>`:'<div class="cls-none">なし</div>'}
      </div>`
    }).join('')
  }
  return `<div class="shdr">元素・区分</div>
  <div class="cls-section">
    <div class="cls-title">四元素</div>
    <div class="cls-grid-4">${group(ELEM,ECOL)}</div>
  </div>
  <div class="cls-section">
    <div class="cls-title">三区分</div>
    <div class="cls-grid-3">${group(QUAL,QCOL)}</div>
  </div>
  <div class="cls-section">
    <div class="cls-title">二区分（男性・女性）</div>
    <div class="cls-grid-2">${group(POL,PCOL)}</div>
  </div>`
}

// Canvas wheel
function drawWheel(h){
  const cv=document.getElementById('wheel')
  if(!cv) return
  const size=Math.round(Math.min(window.innerHeight*0.85,window.innerWidth*0.85,750)), dpr=Math.min(window.devicePixelRatio||1,2)
  const canvasW=size+40
  cv.width=canvasW*dpr; cv.height=size*dpr
  cv.style.width=canvasW+'px'; cv.style.height=size+'px'
  const ctx=cv.getContext('2d')
  ctx.scale(dpr,dpr)
  const cx=canvasW/2, cy=size/2

  // サンプル準拠の半径
  const R_SO   = size*0.46   // 星座帯外側
  const R_SI   = size*0.40   // 星座帯内側（さらに細く）
  const R_NUM  = size*0.15   // ハウス番号
  const R_PLN  = size*0.35   // 惑星配置（内側に移動）
  // 中心円なし

  const asc=h.houses.ascendant
  // cuspsをASCを起点に時計回りに並べ替え
  const rawCusps=h.houses.cusps
  const sortedCusps=[0]
  const pairs=[]
  for(let i=1;i<=12;i++) pairs.push({house:i,lon:rawCusps[i]})
  pairs.sort((a,b)=>((a.lon-asc+360)%360)-((b.lon-asc+360)%360))
  pairs.forEach((p,i)=>sortedCusps[i+1]=p.lon)
  const toA=lon=>((180-(lon-asc))%360+360)%360*Math.PI/180

  // ── 背景 ──
  ctx.clearRect(0,0,size,size)
  ctx.beginPath(); ctx.arc(cx,cy,R_SO,0,2*Math.PI)
  ctx.fillStyle='#07041a'; ctx.fill()

  // ── 12星座帯 ──
  const SIGN_BG=[
    'rgba(95,22,22,.95)','rgba(22,60,22,.95)','rgba(18,42,78,.95)','rgba(32,18,78,.95)',
    'rgba(95,22,22,.95)','rgba(22,60,22,.95)','rgba(18,42,78,.95)','rgba(32,18,78,.95)',
    'rgba(95,22,22,.95)','rgba(22,60,22,.95)','rgba(18,42,78,.95)','rgba(32,18,78,.95)',
  ]
  const SIGN_COL=['#FF6644','#55CC55','#44AAFF','#9977EE',
                  '#FF6644','#55CC55','#44AAFF','#9977EE',
                  '#FF6644','#55CC55','#44AAFF','#9977EE']
  const SYMS=['\u2648','\u2649','\u264A','\u264B','\u264C','\u264D',
               '\u264E','\u264F','\u2650','\u2651','\u2652','\u2653']

  for(let i=0;i<12;i++){
    const aS=toA(i*30), aE=toA((i+1)*30)
    ctx.beginPath()
    ctx.arc(cx,cy,R_SO,aS,aE,true)
    ctx.arc(cx,cy,R_SI,aE,aS,false)
    ctx.closePath()
    ctx.fillStyle=SIGN_BG[i]; ctx.fill()

    // 境界線
    ctx.beginPath()
    ctx.moveTo(cx+R_SI*Math.cos(aS),cy+R_SI*Math.sin(aS))
    ctx.lineTo(cx+R_SO*Math.cos(aS),cy+R_SO*Math.sin(aS))
    ctx.strokeStyle='rgba(180,140,255,.5)'; ctx.lineWidth=0.8; ctx.stroke()

    // 星座記号
    let amid
    if(aE>aS){const len=aS+(2*Math.PI-aE);amid=aS-len/2;if(amid<0)amid+=2*Math.PI}
    else amid=(aS+aE)/2
    const rf=(R_SO+R_SI)/2
    ctx.fillStyle=SIGN_COL[i]
    ctx.font=`bold ${size*0.036}px Arial,sans-serif`
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText(SYMS[i],cx+rf*Math.cos(amid),cy+rf*Math.sin(amid))
  }

  // ── リング境界 ──
  for(const [r,c,lw] of [
    [R_SO,'rgba(170,120,255,.65)',1.3],
    [R_SI,'rgba(170,120,255,.45)',1.0],
  ]){
    ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI)
    ctx.strokeStyle=c; ctx.lineWidth=lw; ctx.stroke()
  }

  // ── ハウスカスプ線（R_SI から中心まで貫通） ──
  for(let n=1;n<=12;n++){
    const a=toA(sortedCusps[n])
    const isAng=[1,4,7,10].includes(n)
    ctx.beginPath()
    ctx.moveTo(cx, cy)  // 中心から
    ctx.lineTo(cx+R_SI*Math.cos(a), cy+R_SI*Math.sin(a))  // 星座帯内縁まで
    ctx.strokeStyle='rgba(255,255,255,0.15)'
    ctx.lineWidth=0.4; ctx.stroke()
  }

  // ── ハウス番号（R_NUM リング） ──
  for(let n=1;n<=12;n++){
    const c1=sortedCusps[n]
    const c2=sortedCusps[n===12?1:n+1]
    let arc=c2-c1; if(arc<=0) arc+=360
    const midA=toA(c1+arc/2)
    const isAng=[1,4,7,10].includes(n)
    ctx.fillStyle=isAng?'rgba(255,200,60,.9)':'rgba(190,165,255,.75)'
    ctx.font=`${size*0.022}px Cinzel,serif`
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText(String(n),cx+R_NUM*Math.cos(midA),cy+R_NUM*Math.sin(midA))
  }

  // ── アスペクト線 ──
  const pos={}
  h.planets.forEach(p=>{
    const a=toA(p.longitude)
    pos[p.name]={x:cx+R_PLN*Math.cos(a),y:cy+R_PLN*Math.sin(a)}
  })
  const HARD_ASP=new Set(['Square','Opposition','Semisquare'])
  const SKIP_ASP=new Set(['Sesquiquadrate'])
  h.aspects.forEach(asp=>{
    const p1=pos[asp.planet1],p2=pos[asp.planet2]; if(!p1||!p2) return
    if(SKIP_ASP.has(asp.type)) return
    const col=ACOL[asp.type]||'#888'
    const alpha=Math.max(0.4,0.8-0.06*asp.orb)
    const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16)
    if(HARD_ASP.has(asp.type)) ctx.setLineDash([5,4])
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y)
    ctx.strokeStyle=`rgba(${r},${g},${b},${alpha})`
    ctx.lineWidth=asp.exact?2.5:1.8; ctx.stroke()
    if(HARD_ASP.has(asp.type)) ctx.setLineDash([])
  })

  // ── 惑星（扇状分散配置） ──
  const minPx=14
  const step=minPx/R_PLN  // radians equivalent of 14px at R_PLN
  const rawAngles=h.planets.map(p=>({p,a:toA(p.longitude)}))
  // union-find cluster: group planets whose arcs on R_PLN are within minPx
  const parent=rawAngles.map((_,i)=>i)
  function find(i){return parent[i]===i?i:(parent[i]=find(parent[i]))}
  function union(i,j){parent[find(i)]=find(j)}
  for(let i=0;i<rawAngles.length;i++){
    for(let j=i+1;j<rawAngles.length;j++){
      const da=Math.abs(rawAngles[i].a-rawAngles[j].a)
      const arc=Math.min(da,2*Math.PI-da)
      if(arc*R_PLN<minPx) union(i,j)
    }
  }
  // collect clusters
  const clusters={}
  rawAngles.forEach((_,i)=>{
    const r=find(i)
    if(!clusters[r]) clusters[r]=[]
    clusters[r].push(i)
  })
  // spread each cluster evenly around its mean angle
  const finalAngles=rawAngles.map(x=>x.a)
  Object.values(clusters).forEach(idxs=>{
    if(idxs.length===1) return
    // circular mean
    let sx=0,sy=0
    idxs.forEach(i=>{sx+=Math.cos(rawAngles[i].a);sy+=Math.sin(rawAngles[i].a)})
    const mean=Math.atan2(sy/idxs.length,sx/idxs.length)
    // sort by original angle relative to mean
    idxs.sort((a,b)=>{
      const da=((rawAngles[a].a-mean+Math.PI)%(2*Math.PI))-Math.PI
      const db=((rawAngles[b].a-mean+Math.PI)%(2*Math.PI))-Math.PI
      return da-db
    })
    const n=idxs.length
    const span=(n-1)*step
    idxs.forEach((idx,k)=>{finalAngles[idx]=mean-span/2+k*step})
  })
  const pData=rawAngles.map(({p},i)=>({p,a:finalAngles[i]}))

  // ── 実際位置→グリフ位置 コネクタ線（重なり分散した天体のみ） ──
  rawAngles.forEach(({p},i)=>{
    const aOrig=rawAngles[i].a, aFinal=finalAngles[i]
    if(Math.abs(aFinal-aOrig)<0.001) return
    const col=PLCOL[p.name]||'#e0d8ff'
    const rv=parseInt(col.slice(1,3),16),gv=parseInt(col.slice(3,5),16),bv=parseInt(col.slice(5,7),16)
    ctx.beginPath()
    ctx.moveTo(cx+R_PLN*Math.cos(aOrig),cy+R_PLN*Math.sin(aOrig))
    ctx.lineTo(cx+R_PLN*Math.cos(aFinal),cy+R_PLN*Math.sin(aFinal))
    ctx.strokeStyle=`rgba(${rv},${gv},${bv},0.45)`
    ctx.lineWidth=0.9; ctx.stroke()
    ctx.beginPath()
    ctx.arc(cx+R_PLN*Math.cos(aOrig),cy+R_PLN*Math.sin(aOrig),2.5,0,2*Math.PI)
    ctx.fillStyle=`rgba(${rv},${gv},${bv},0.7)`; ctx.fill()
  })

  pData.forEach(({p,a})=>{
    const px=cx+R_PLN*Math.cos(a), py=cy+R_PLN*Math.sin(a)
    const col=PLCOL[p.name]||'#e0d8ff'
    ctx.fillStyle=col
    ctx.font=`bold ${size*0.048}px Arial,sans-serif`
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText(p.symbol,px,py)
    if(p.retrograde){
      ctx.fillStyle='#FF9999'
      ctx.font=`bold ${size*0.018}px sans-serif`
      ctx.fillText('R',px+size*0.030,py-size*0.032)
    }
    ctx.fillStyle='rgba(220,200,255,.8)'
    ctx.font=`${size*0.016}px monospace`
    ctx.fillText(p.degree+'\u00b0',px,py+size*0.034)
  })

  // ── AC/DC/MC/ICラベル（星座帯の外側） ──
  ;[
    [asc,'AC','#FFD700'],
    [h.houses.midheaven,'MC','#88CCFF'],
    [(asc+180)%360,'DC','#FFD700'],
    [(h.houses.midheaven+180)%360,'IC','#88CCFF'],
  ].forEach(([lon,lbl,col])=>{
    const a=toA(lon), r=R_SO*1.08
    ctx.fillStyle=col
    ctx.font=`bold ${size*0.026}px Cinzel,serif`
    ctx.textAlign='center'; ctx.textBaseline='middle'
    // テキストが枠外に出ないようクリッピング解除して描画
    ctx.save()
    ctx.fillText(lbl,cx+r*Math.cos(a),cy+r*Math.sin(a))
    ctx.restore()
  })
}

</script>
